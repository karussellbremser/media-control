<!DOCTYPE html>
<html>
<head>
    <title>My Movies</title>
	<script src="/static/search.js" defer></script>
	
	<style>
        body {
            margin: 0;
            font-family: "Segoe UI", Roboto, Arial, sans-serif;
			background-color: #dcdcdc;
        }
		
		button {
			padding: 6px;
			border-radius: 5px;
			border: 1px solid #bbb;
			background-color: #e6e6e6;
			cursor: pointer;
		}

		button:hover {
			background-color: #d0d0d0;
		}

        .container {
            display: flex;
        }

        .sidebar {
            width: 300px;
            height: 100vh;
            overflow-y: auto;
            background-color: #dcdcdc;
            padding: 15px;
            box-sizing: border-box;
            position: fixed;
            left: 0;
            top: 0;
        }

        .content {
            margin-left: 320px;
            padding: 20px;
            width: calc(100% - 320px);
			background-color: #dcdcdc;
        }

        input, select, button {
            width: 100%;
            margin-bottom: 10px;
            padding: 5px;
            box-sizing: border-box;
        }
		
		.genre-list label {
			display: flex;
			align-items: center;
			gap: 6px;
		}

		.genre-list input[type="checkbox"] {
			width: auto;
		}

        .genre-list {
			overflow-y: auto;
			border: 1px solid #ccc;
			padding: 5px;
			background: white;

			display: grid;
			grid-template-columns: 1fr 1fr;
		}
		
		#resetButton {
			margin-top: 10px;
			background-color: #ddd;
			cursor: pointer;
		}
		
		.titleLink {
			color: inherit;
			text-decoration: none;
		}

		.titleLink:visited {
			color: inherit;
		}

		.titleLink:hover {
			text-decoration: underline;
		}

		.titleLink:active {
			color: inherit;
		}
		
		.resultItem {
			display: flex;
			gap: 20px;
			margin-bottom: 20px;
		}

		.coverImage {
			width: 140px;
			height: 210px;
			object-fit: cover;
			border-radius: 6px;
		}

		.resultItem div {
			flex: 1;
		}
		
		.gridView {
			display: grid;
			grid-template-columns: repeat(auto-fill, 250px);
			gap: 15px;
		}

		.gridItem img {
			width: 250px;
			height: 370px;
			object-fit: cover;
			border-radius: 6px;
			background-color: #ddd;
		}

		.gridItem {
			text-align: center;
		}
		
		.gridItem img:hover {
			transform: scale(1.05);
			transition: transform 0.2s;
		}
		
		#listViewBtn, #gridViewBtn {
			width: 48%;
			display: inline-block;
		}

		.activeView {
			background-color: #b0b0b0;
			font-weight: bold;
		}
    </style>
</head>
<body>
	<div class="container">

    <!-- left side -->
    <div class="sidebar">
		<button id="resetButton">RESET FILTERS</button>
		
		<h3>View</h3>
		<button id="listViewBtn">List</button>
		<button id="gridViewBtn">Coverwall</button>
		
		<h2>Search</h2>
		
		<input type="text" id="searchInput" placeholder="Search titles">
		
		<h3>Sort by</h3>
		
		<select id="sortSelect">
			<option value="year" selected>release year</option>
			<option value="title">title</option>
			<option value="rating">IMDb rating</option>
			<option value="votes"># of IMDb votes</option>
		</select>
		
		<button id="orderButton">↓ Descending</button>
		
		<h3>Genres</h3>
		<div class="genre-list">
		{% for genre_id, genre_name in genres %}
			<label>
				<input type="checkbox" class="genreCheckbox" value="{{ genre_id }}">
				<span>{{ genre_name }}</span>
			</label>
		{% endfor %}
		</div>
		
		<h3>Year</h3>
		<input type="number" id="yearFrom" placeholder="from">
		<input type="number" id="yearTo" placeholder="to">

		<h3>IMDb Rating</h3>
		<input type="number" step="0.1" id="ratingFrom" placeholder="from">
		<input type="number" step="0.1" id="ratingTo" placeholder="to">

		<h3># of IMDb Votes:</h3>
		<input type="number" id="votesFrom" placeholder="from">
		<input type="number" id="votesTo" placeholder="to">
	</div>

	<!-- right side -->
    <div class="content">
		<div id="results">
			<!-- results appear here -->
		</div>
	</div>
</body>
</html>
